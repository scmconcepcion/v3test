<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内イントラDX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body><!-- OPTIONS (UPDATED - SAME DESIGN) -->
<section class="options">
<h2>オプションサービス</h2>

<p class="sub">
イントラ導入と合わせてサポート可能<br>
<span class="highlight">お客様のニーズに応じたITサービスもご提供しています</span>
</p>

<div class="option-grid">

<div class="option-card">
<i class="fa-solid fa-file-excel"></i>
<h3>Excel・Word ワンポイント講座</h3>
<p>よく使う機能を分かりやすくサポート</p>
</div>

<div class="option-card">
<i class="fa-solid fa-wifi"></i>
<h3>Wi-Fi環境改善</h3>
<p>通信トラブルや速度改善</p>
</div>

<div class="option-card">
<i class="fa-solid fa-laptop-code"></i>
<h3>Webデザイン</h3>
<p>企業サイト・LP制作など柔軟に対応</p>
</div>

<div class="option-card">
<i class="fa-solid fa-shield-halved"></i>
<h3>ネットワーク / セキュリティ</h3>
<p>安全で安定したIT環境を構築</p>
</div>

<div class="option-card">
<i class="fa-solid fa-headset"></i>
<h3>ITサポート</h3>
<p>日常のトラブルや運用をサポート</p>
</div>

<div class="option-card">
<i class="fa-solid fa-lightbulb"></i>
<h3>ITコンサルティング</h3>
<p>業務改善・DX推進をご提案</p>
</div>

</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>お問い合わせ</h2>

<form action="mailto:shiela.concepcion@gbi.co.jp" method="POST" enctype="text/plain">
<input placeholder="会社名" required>
<input type="email" placeholder="メール" required>
<textarea placeholder="内容" required></textarea>
<button>送信</button>
</form>

</section>

<script>
let currentPlan = null;

function showFeatures(plan, el){

const grid = document.getElementById("featureGrid");
const section = document.getElementById("featuresSection");

document.querySelectorAll(".plan").forEach(p=>{
p.classList.remove("active");
});

if(currentPlan === plan){
section.style.display = "none";
currentPlan = null;
return;
}

el.classList.add("active");
currentPlan = plan;

const features = {
light: [
["fa-clock","勤怠管理"],
["fa-comments","社内チャット"],
["fa-calendar","カレンダー"],
["fa-bell","通知機能"]
],
standard: [
["fa-clock","勤怠管理"],
["fa-comments","社内チャット"],
["fa-newspaper","社内報"],
["fa-calendar","カレンダー"],
["fa-robot","AI日報"],
["fa-bell","通知機能"],
["fa-users","メンバー管理"],
["fa-address-book","連絡先管理"],
["fa-shield-halved","緊急連絡先"]
]
};

grid.innerHTML = "";

features[plan].forEach(f=>{
grid.innerHTML += `
<div class="feature-card">
<i class="fa-solid ${f[0]}"></i>
<p>${f[1]}</p>
</div>`;
});

section.style.display = "block";
section.scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
